name: Build and Deploy Flatris to Azure Web App - skyblue

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Node.js 18
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'yarn'

      - name: Install dependencies (fix peer deps)
        run: yarn install --legacy-peer-deps

      - name: Build project
        run: yarn build

      - name: Prepare artifact for deployment
        run: |
          mkdir artifact
          cp -r dist/* artifact/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: flatris-build
          path: artifact

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: flatris-build

      - name: Login to Azure using Federated Identity
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_7F22D299B89645469F3E294E5968D094 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_EF33C9196FEA4CF69CC988BA6A258497 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_4B19B878ADDE427CA49CD10A54A00AC5 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'skyblue'
          slot-name: 'Production'
          package: artifact
